name: Temporary BTC Risk Validation

on:
  pull_request: {}
  workflow_dispatch: {}

permissions:
  contents: read

jobs:
  validate:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Install dependencies
        run: pip install -q pandas numpy matplotlib
      - name: Run validation
        run: python tmp/btc-risk-validation/validate.py
      - name: Upload validation outputs
        uses: actions/upload-artifact@v4
        with:
          name: btc-risk-validation-output
          path: btc_risk_proxy_*
