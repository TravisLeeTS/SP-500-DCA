start_date: "1970-01"
macro_lag_months: 1
stale_after_days: 45
manual_overrides:
  cape: null
  cape_as_of: null
  cape_source_note: null
paths:
  raw_dir: "data/raw"
  processed_dir: "data/processed"
  reports_dir: "reports"
dca:
  base_aed: 5000
  regimes:
    Green: {min_aed: 4000, max_aed: 6000, default_aed: 5000}
    Yellow: {min_aed: 3000, max_aed: 4000, default_aed: 3500}
    Orange-A: {min_aed: 2000, max_aed: 3500, default_aed: 2750}
    Orange-B: {min_aed: 1500, max_aed: 2500, default_aed: 2000}
    Red: {min_aed: 0, max_aed: 1000, default_aed: 500}
    Accumulation-1: {min_aed: 5000, max_aed: 7000, default_aed: 6000}
    Accumulation-2: {min_aed: 7000, max_aed: 10000, default_aed: 8500}
    Accumulation-3: {min_aed: 10000, max_aed: 10000, default_aed: 10000}
thresholds:
  cape_green_lt: 25
  cape_yellow_lt: 30
  cape_orange_lt: 35
  cape_extreme_gte: 35
  cape_bubble_gte: 40
  baa_calm_lt: 1.0
  baa_watch_lt: 1.5
  baa_stress_lt: 2.0
  baa_fast_widening: 0.4
  hy_warning: 4.5
  hy_serious: 5.5
  hy_fast_widening: 1.5
  sahm_watch: 0.3
  sahm_stress: 0.5
  real_yield_supportive_lt: 0.5
  real_yield_neutral_lt: 1.5
  real_yield_tight_lt: 2.0
  accumulation_1_dd: -0.15
  accumulation_2_dd: -0.20
  accumulation_3_dd: -0.30
  drawdown_warning: -0.10
  orange_b_drawdown: -0.05
sources:
  fred:
    sp500: "SP500"
    baa: "BAA"
    aaa: "AAA"
    hy_oas: "BAMLH0A0HYM2"
    unrate: "UNRATE"
    t10y3m: "T10Y3M"
    t10y2y: "T10Y2Y"
    dgs10: "DGS10"
    dgs3mo: "DGS3MO"
    dgs2: "DGS2"
    real_yield_10y: "DFII10"
  yahoo_spx: "^GSPC"
  shiller_url: "http://www.econ.yale.edu/~shiller/data/ie_data.xls"
